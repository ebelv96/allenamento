<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scheda Allenamento</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Allenamento">
<meta name="theme-color" content="#1a1815">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#1a1815; }
  body {
    --bg: #1a1815;
    --surface: #232019;
    --surface-2: #2b271f;
    --line: #3a352a;
    --text: #efe9dd;
    --text-dim: #a89e8c;
    --accent: #c99a3b;
    --accent-dim: #8a6b28;
    --tag-legs: #b0522f;
    --tag-arms: #3f7592;
    --tag-core: #6a8a4f;
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px 0;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: "SF Mono", SFMono-Regular, ui-monospace, Menlo, Consolas, monospace; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 0; }

  .hdr { padding: 6px 4px 18px; border-bottom: 1px solid var(--line); }
  .hdr .eyebrow { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .hdr h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.01em; margin: 4px 0 2px; text-transform: uppercase; }
  .hdr .date { font-size: 13px; color: var(--text-dim); text-transform: capitalize; }
  .sync-status { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .sync-status.ok { color: var(--tag-core); }
  .sync-status.err { color: var(--tag-legs); }

  .tabs { display: flex; gap: 8px; margin: 18px 0 6px; }
  .tab {
    flex: 1; padding: 12px 6px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--surface); color: var(--text-dim); text-align: center; cursor: pointer;
    font-weight: 700; font-size: 12.5px; letter-spacing: .02em; transition: all .15s ease;
  }
  .tab .sub { display:block; font-weight: 500; font-size: 10.5px; margin-top:2px; opacity:.8; text-transform:none; letter-spacing:0; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #1a1815; }
  .tab .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--tag-core); margin-left:5px; vertical-align:middle; opacity:0; }
  .tab.done .dot { opacity: 1; }

  .progress-row { display:flex; align-items:center; gap:10px; margin: 14px 0 4px; }
  .progress-track { flex:1; height:8px; background: var(--surface-2); border-radius: 5px; overflow:hidden; }
  .progress-fill { height:100%; background: var(--accent); width:0%; transition: width .3s ease; }
  .progress-pct { font-size: 12px; color: var(--text-dim); min-width: 34px; text-align:right; }

  .ex-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 14px 12px; margin-top: 12px; }
  .ex-top { display:flex; justify-content: space-between; align-items:flex-start; gap: 10px; }
  .ex-name { font-size: 15.5px; font-weight: 700; line-height:1.25; }
  .ex-target { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .tag { font-size: 9.5px; font-weight: 800; letter-spacing:.06em; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; white-space:nowrap; }
  .tag.legs { background: var(--tag-legs); color:#f4ece2; }
  .tag.braccia, .tag.arms { background: var(--tag-arms); color:#f4ece2; }
  .tag.addome, .tag.core { background: var(--tag-core); color:#f4ece2; }

  .video-link {
    display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-size: 12px;
    color: var(--accent); text-decoration:none; font-weight:600; border-bottom: 1px solid transparent;
  }
  .video-link:hover { border-bottom-color: var(--accent); }
  .play-ico { width:16px; height:16px; border-radius:50%; background: var(--accent-dim); display:inline-flex; align-items:center; justify-content:center; font-size:8px; color:#1a1815; flex-shrink:0; }

  .sets-row { display:flex; gap:8px; margin-top: 12px; flex-wrap: wrap; align-items:center; }
  .set-btn {
    width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--line); background: var(--surface-2);
    color: var(--text-dim); font-weight: 700; font-size: 13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: all .12s ease;
  }
  .set-btn.checked { background: var(--accent); border-color: var(--accent); color: #1a1815; }

  .weight-row { display:flex; align-items:center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); flex-wrap:wrap; }
  .weight-row label { font-size: 11.5px; color: var(--text-dim); flex-shrink:0; }
  .weight-row input {
    width: 68px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
    color: var(--text); padding: 6px 8px; font-size: 13px; font-weight: 600;
  }
  .weight-row input:focus { outline: 2px solid var(--accent-dim); }
  .weight-row .unit { font-size: 11.5px; color: var(--text-dim); }
  .rest-btn {
    margin-left: auto; background: none; border: 1px solid var(--line); color: var(--text-dim);
    border-radius: 8px; padding: 6px 10px; font-size: 11.5px; font-weight: 700; cursor:pointer;
  }
  .rest-btn:active { background: var(--surface-2); }

  .section-title { margin: 28px 0 4px; padding: 0 2px; }
  .section-title .eyebrow { font-size: 11px; letter-spacing:.16em; text-transform:uppercase; color: var(--tag-core); font-weight: 800; }
  .section-title h2 { font-size: 19px; font-weight: 800; margin: 3px 0; text-transform:uppercase; letter-spacing:-.01em;}
  .section-title p { font-size: 12px; color: var(--text-dim); margin:0; }

  .round-card { background: var(--surface); border:1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; margin-top: 10px; }
  .round-head { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color: var(--tag-core); text-transform:uppercase; letter-spacing:.05em; margin-bottom: 8px;}
  .circuit-item { display:flex; align-items:center; justify-content:space-between; gap: 10px; padding: 8px 0; border-top: 1px solid var(--line); }
  .circuit-item:first-of-type { border-top: none; }
  .circuit-item .ci-name { font-size: 13.5px; font-weight: 600; }
  .circuit-item .ci-target { font-size: 11px; color: var(--text-dim); }
  .circuit-item .ci-right { display:flex; align-items:center; gap: 8px; }
  .mini-btn {
    width:30px; height:30px; border-radius:8px; border:1.5px solid var(--line); background:var(--surface-2);
    color: var(--text-dim); font-weight:800; cursor:pointer; font-size:14px;
  }
  .mini-btn.checked { background: var(--tag-core); border-color: var(--tag-core); color:#14180f; }
  .plank-btn {
    background: var(--surface-2); border: 1.5px solid var(--line); border-radius:8px; padding:6px 10px;
    color: var(--text); font-weight:700; font-size:12px; cursor:pointer; min-width: 74px; text-align:center;
  }
  .plank-btn.running { background: var(--tag-legs); border-color: var(--tag-legs); color:#fff2ea; }
  .plank-btn.done { background: var(--tag-core); border-color: var(--tag-core); color:#14180f; }

  .sync-bar { display:flex; gap:10px; margin-top: 22px; }
  .sync-bar button {
    flex:1; background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 12px; font-weight: 700; font-size: 13px; cursor:pointer;
  }
  .sync-bar button.primary { background: var(--accent); border-color: var(--accent); color:#1a1815; }

  .fab {
    position: fixed; right: 18px; bottom: 18px; width: 58px; height: 58px; border-radius: 50%;
    background: var(--accent); color:#1a1815; border:none; font-size: 22px; font-weight:800; cursor:pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,.4); z-index: 40; display:flex; align-items:center; justify-content:center;
  }
  .timer-panel {
    position: fixed; left: 0; right:0; bottom:0; background: var(--surface); border-top: 1px solid var(--line);
    border-radius: 18px 18px 0 0; padding: 18px 20px calc(26px + env(safe-area-inset-bottom)); z-index: 41; transform: translateY(110%);
    transition: transform .25s ease; box-shadow: 0 -8px 30px rgba(0,0,0,.5);
  }
  .timer-panel.open { transform: translateY(0); }
  .timer-panel .th { display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px; }
  .timer-panel .th span { font-weight: 800; text-transform:uppercase; font-size: 13px; letter-spacing:.05em; color: var(--text-dim); }
  .close-btn { background:none; border:none; color: var(--text-dim); font-size:20px; cursor:pointer; }
  .timer-display { font-size: 52px; font-weight: 700; text-align:center; letter-spacing: .02em; margin: 6px 0 14px; }
  .timer-controls { display:flex; gap: 10px; justify-content:center; margin-bottom: 14px; flex-wrap:wrap; }
  .timer-controls button {
    background: var(--surface-2); border: 1px solid var(--line); color: var(--text); border-radius: 10px;
    padding: 10px 18px; font-weight:700; font-size:13px; cursor:pointer;
  }
  .timer-controls button.primary { background: var(--accent); border-color: var(--accent); color:#1a1815; }
  .presets { display:flex; gap:8px; justify-content:center; }
  .presets button {
    background: none; border: 1px solid var(--line); color: var(--text-dim); border-radius: 8px;
    padding: 7px 12px; font-size: 12px; font-weight:700; cursor:pointer;
  }
  .presets button.sel { border-color: var(--accent); color: var(--accent); }

  .footer-note { text-align:center; font-size: 11.5px; color: var(--text-dim); margin-top: 18px; padding: 0 20px; line-height:1.5;}
  .overlay { position: fixed; inset:0; background: rgba(0,0,0,.4); z-index: 39; opacity:0; pointer-events:none; transition: opacity .2s ease; }
  .overlay.show { opacity:1; pointer-events:all; }
  .loading-msg { text-align:center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>
<div id="app-root"><div class="loading-msg">Carico la scheda…</div></div>

<script>
(function(){

  // ====================== CONFIGURAZIONE ======================
  // Incolla qui l'URL del tuo Apps Script (termina con /exec).

  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby0gucmFC-IJmFoKv07mBi3L10ls4Gj_M482T5APZwOxMg7kgkbI3PHlF43UCRr8dYd8w/exec"; // <-- INSERISCI QUI IL TUO URL

  // Scheda di default (usata se SHEET_API_URL è vuoto o il foglio non risponde)
  const DEFAULT_GIORNI = [
    {Giorno:"1", Etichetta:"Giorno 1", Sottotitolo:"Gambe/Glutei A", Tag:"legs"},
    {Giorno:"2", Etichetta:"Giorno 2", Sottotitolo:"Spalle/Braccia", Tag:"braccia"},
    {Giorno:"3", Etichetta:"Giorno 3", Sottotitolo:"Gambe/Glutei B", Tag:"legs"}
  ];
  const DEFAULT_ESERCIZI = [
    {Giorno:"1", Ordine:"1", Nome:"Squat con bilanciere", Serie:"4", Target:"10-12 rip", Video:"https://www.youtube.com/watch?v=ThD3d6kNjuA"},
    {Giorno:"1", Ordine:"2", Nome:"Hip Thrust con bilanciere", Serie:"4", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=IHk9Qn8ttX8"},
    {Giorno:"1", Ordine:"3", Nome:"Leg Press 45°", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=LMTyPl_oo38"},
    {Giorno:"1", Ordine:"4", Nome:"Affondi in camminata con manubri", Serie:"3", Target:"10 rip/gamba", Video:"https://www.youtube.com/watch?v=5IzLQWqiggg"},
    {Giorno:"1", Ordine:"5", Nome:"Leg Curl (sdraiato/seduto)", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=1zevKZn_n1E"},
    {Giorno:"2", Ordine:"1", Nome:"Military Press manubri (seduta)", Serie:"4", Target:"10-12 rip", Video:"https://www.youtube.com/watch?v=n5emn5Pee5o"},
    {Giorno:"2", Ordine:"2", Nome:"Alzate laterali con manubri", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=6sT8LVeGVoc"},
    {Giorno:"2", Ordine:"3", Nome:"Curl bicipiti con manubri", Serie:"3", Target:"12 rip", Video:"https://www.youtube.com/watch?v=QaXCjUMCp90"},
    {Giorno:"2", Ordine:"4", Nome:"Curl Hammer con manubri", Serie:"3", Target:"12 rip", Video:"https://www.youtube.com/watch?v=R_Afr1mMRi8"},
    {Giorno:"2", Ordine:"5", Nome:"French Press manubri su panca", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=RLGF2C58pPI"},
    {Giorno:"3", Ordine:"1", Nome:"Hip Thrust con bilanciere", Serie:"4", Target:"10-12 rip (carico alto)", Video:"https://www.youtube.com/watch?v=IHk9Qn8ttX8"},
    {Giorno:"3", Ordine:"2", Nome:"Leg Curl (sdraiato/seduto)", Serie:"4", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=1zevKZn_n1E"},
    {Giorno:"3", Ordine:"3", Nome:"Squat con bilanciere", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=ThD3d6kNjuA"},
    {Giorno:"3", Ordine:"4", Nome:"Leg Press 45°", Serie:"3", Target:"12-15 rip", Video:"https://www.youtube.com/watch?v=LMTyPl_oo38"},
    {Giorno:"3", Ordine:"5", Nome:"Affondi in camminata con manubri", Serie:"3", Target:"12 rip/gamba", Video:"https://www.youtube.com/watch?v=5IzLQWqiggg"}
  ];
  const DEFAULT_CIRCUITO = [
    {Ordine:"1", Nome:"Plank", Target:"30-45 sec", Video:"https://www.youtube.com/watch?v=Is-7PPaBcsM", TimerSecondi:"40"},
    {Ordine:"2", Nome:"Crunch classico", Target:"15-20 rip", Video:"https://www.youtube.com/watch?v=Iep9ffXKQHw", TimerSecondi:""},
    {Ordine:"3", Nome:"Crunch a bicicletta", Target:"15-20 rip/lato", Video:"https://www.youtube.com/watch?v=RC4wOdLdZr0", TimerSecondi:""}
  ];
  // ==============================================================

  const ROUNDS = [1,2,3];
  const todayKey = new Date().toISOString().slice(0,10);
  const dayNamesIt = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
  const monthNamesIt = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  const now = new Date();
  const dateLabel = dayNamesIt[now.getDay()] + " " + now.getDate() + " " + monthNamesIt[now.getMonth()];

  let DAYS = {};        // built from GIORNI + ESERCIZI
  let CIRCUIT = [];      // built from CIRCUITO
  let syncStatus = { text: "Dati locali (di default)", cls: "" };

  let state = { currentDay: "1", progress: {}, weights: {} };
  let timer = { mode: null, seconds: 0, running: false, interval: null, preset: 90, onFinishTag: null };

  // ---------- storage (localStorage, persistente sul telefono/browser) ----------
  function safeGet(key){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  function safeSet(key, val){
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){ console.error("storage error", e); }
  }

  function buildDaysFromSheets(giorni, esercizi, circuito){
    const days = {};
    giorni.forEach(g => {
      const id = String(g.Giorno).trim();
      days[id] = { label: g.Etichetta || ("Giorno " + id), sub: g.Sottotitolo || "", tag: (g.Tag||"legs").trim(), exercises: [] };
    });
    esercizi
      .map(e => ({...e, Giorno: String(e.Giorno).trim()}))
      .sort((a,b) => (parseInt(a.Ordine)||0) - (parseInt(b.Ordine)||0))
      .forEach(e => {
        if (!days[e.Giorno]) return;
        days[e.Giorno].exercises.push({
          id: "d" + e.Giorno + "-" + (days[e.Giorno].exercises.length+1),
          name: e.Nome, target: e.Target, sets: parseInt(e.Serie)||1, video: e.Video
        });
      });
    const circuit = circuito
      .slice()
      .sort((a,b) => (parseInt(a.Ordine)||0) - (parseInt(b.Ordine)||0))
      .map((c,i) => ({
        id: "c" + i, name: c.Nome, target: c.Target, video: c.Video,
        isTimer: !!(c.TimerSecondi && parseInt(c.TimerSecondi) > 0),
        duration: parseInt(c.TimerSecondi) || 0
      }));
    return { days, circuit };
  }

  async function fetchSheetData(){
    if (!SHEET_API_URL) {
      syncStatus = { text: "Modalità offline: modifica gli esercizi nel codice (SHEET_API_URL non impostato)", cls: "" };
      return null;
    }
    try {
      const res = await fetch(SHEET_API_URL, { method: "GET" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      safeSet("cached-sheet-data", data);
      syncStatus = { text: "Esercizi aggiornati dal Google Sheet", cls: "ok" };
      return data;
    } catch(err){
      const cached = safeGet("cached-sheet-data");
      if (cached) {
        syncStatus = { text: "Foglio non raggiungibile: uso l'ultima copia salvata", cls: "err" };
        return cached;
      }
      syncStatus = { text: "Foglio non raggiungibile: uso la scheda di default", cls: "err" };
      return null;
    }
  }

  function emptyProgressForDay(dayId){
    const exObj = {};
    DAYS[dayId].exercises.forEach(ex => exObj[ex.id] = new Array(ex.sets).fill(false));
    const circuitObj = {};
    ROUNDS.forEach(r => circuitObj[r] = {}); // per-item booleans, keyed by circuit item id
    CIRCUIT.forEach(c => ROUNDS.forEach(r => circuitObj[r][c.id] = false));
    return { exercises: exObj, circuit: circuitObj };
  }

  function loadProgressAndWeights(){
    Object.keys(DAYS).forEach(dayId => {
      const key = "progress:" + todayKey + ":" + dayId;
      let saved = safeGet(key);
      if (!saved) saved = emptyProgressForDay(dayId);
      // riallinea in caso la lista esercizi sia cambiata nel foglio
      DAYS[dayId].exercises.forEach(ex => { if (!saved.exercises[ex.id]) saved.exercises[ex.id] = new Array(ex.sets).fill(false); });
      ROUNDS.forEach(r => { if (!saved.circuit[r]) saved.circuit[r] = {}; CIRCUIT.forEach(c => { if (saved.circuit[r][c.id] === undefined) saved.circuit[r][c.id] = false; }); });
      state.progress[dayId] = saved;

      const wkey = "weights:" + dayId;
      state.weights[dayId] = safeGet(wkey) || {};
    });
    const lastDay = safeGet("lastDay");
    if (lastDay && DAYS[lastDay]) state.currentDay = lastDay;
  }

  function saveProgress(dayId){ safeSet("progress:" + todayKey + ":" + dayId, state.progress[dayId]); }
  function saveWeights(dayId){ safeSet("weights:" + dayId, state.weights[dayId]); }

  function dayCompletionPct(dayId){
    const p = state.progress[dayId];
    let total = 0, done = 0;
    Object.values(p.exercises).forEach(arr => { total += arr.length; done += arr.filter(Boolean).length; });
    ROUNDS.forEach(r => { const vals = Object.values(p.circuit[r]); total += vals.length; done += vals.filter(Boolean).length; });
    return total ? Math.round((done/total)*100) : 0;
  }

  function tagClass(tag){ return tag === "legs" ? "legs" : (tag === "braccia" || tag === "arms" ? "braccia" : "addome"); }

  function fmtTime(sec){
    const m = Math.floor(sec/60).toString().padStart(2,"0");
    const s = Math.floor(sec%60).toString().padStart(2,"0");
    return m+":"+s;
  }

  // ---------- sincronizzazione dei risultati verso il Google Sheet (foglio Log) ----------
  async function syncDayToSheet(dayId){
    if (!SHEET_API_URL) { flashSyncMsg("Configura SHEET_API_URL per sincronizzare col foglio"); return; }
    const day = DAYS[dayId];
    const p = state.progress[dayId];
    const entries = day.exercises.map(ex => ({
      exercise: ex.name,
      setsDone: p.exercises[ex.id].filter(Boolean).length,
      setsTotal: ex.sets,
      weight: state.weights[dayId][ex.id] || ""
    }));
    const circuito = ROUNDS.map(r => {
      const row = { round: r };
      CIRCUIT.forEach(c => row[c.name] = p.circuit[r][c.id]);
      return row;
    });
    try {
      await fetch(SHEET_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita preflight CORS
        body: JSON.stringify({ date: todayKey, day: day.label, entries, circuito })
      });
      flashSyncMsg("Sincronizzato ✓ (controlla il foglio Log)");
    } catch(err){
      flashSyncMsg("Sincronizzazione non riuscita, riprova");
    }
  }

  function flashSyncMsg(msg){
    const el = document.getElementById("syncStatusMsg");
    if (el) { el.textContent = msg; }
  }

  // ---------------------------- RENDER ----------------------------
  function render(){
    const root = document.getElementById("app-root");
    const day = DAYS[state.currentDay];
    const pct = dayCompletionPct(state.currentDay);

    let tabsHtml = Object.keys(DAYS).map(id => {
      const d = DAYS[id];
      const done = dayCompletionPct(id) === 100;
      return `<div class="tab ${id===state.currentDay?'active':''} ${done?'done':''}" data-day="${id}">
        ${d.label}<span class="dot"></span><span class="sub">${d.sub}</span>
      </div>`;
    }).join("");

    let exHtml = day.exercises.map(ex => {
      const arr = state.progress[state.currentDay].exercises[ex.id] || [];
      const weight = state.weights[state.currentDay][ex.id] || "";
      let setsHtml = arr.map((checked, i) => `<div class="set-btn ${checked?'checked':''}" data-ex="${ex.id}" data-idx="${i}">${i+1}</div>`).join("");
      return `<div class="ex-card">
        <div class="ex-top">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-target">${arr.length} serie × ${ex.target}</div>
          </div>
          <span class="tag ${tagClass(day.tag)}">${day.sub}</span>
        </div>
        <a class="video-link" href="${ex.video}" target="_blank" rel="noopener">
          <span class="play-ico">▶</span> Guarda l'esecuzione
        </a>
        <div class="sets-row">${setsHtml}</div>
        <div class="weight-row">
          <label>Carico usato</label>
          <input type="number" inputmode="decimal" step="0.5" placeholder="kg" value="${weight}" data-weight-ex="${ex.id}">
          <span class="unit">kg</span>
          <button class="rest-btn" data-rest="90">⏱ Riposo 90"</button>
        </div>
      </div>`;
    }).join("");

    let roundsHtml = ROUNDS.map(r => {
      const rState = state.progress[state.currentDay].circuit[r];
      let itemsHtml = CIRCUIT.map(c => {
        if (c.isTimer){
          const tag = state.currentDay + "-" + r + "-" + c.id;
          const running = timer.mode === "circuittimer" && timer.onFinishTag === tag && timer.running;
          const done = rState[c.id];
          return `<div class="circuit-item">
            <div><div class="ci-name">${c.name}</div><div class="ci-target">${c.target}</div></div>
            <div class="ci-right">
              <a class="video-link" style="margin-top:0" href="${c.video}" target="_blank" rel="noopener"><span class="play-ico">▶</span></a>
              <button class="plank-btn ${running?'running':''} ${done?'done':''}" data-timer-item="${r}|${c.id}|${c.duration}">
                ${done ? '✓ Fatto' : (running ? fmtTime(timer.seconds) : 'Avvia ' + c.duration + '"')}
              </button>
            </div>
          </div>`;
        }
        return `<div class="circuit-item">
          <div><div class="ci-name">${c.name}</div><div class="ci-target">${c.target}</div></div>
          <div class="ci-right">
            <a class="video-link" style="margin-top:0" href="${c.video}" target="_blank" rel="noopener"><span class="play-ico">▶</span></a>
            <div class="mini-btn ${rState[c.id]?'checked':''}" data-circuit="${r}" data-item="${c.id}">✓</div>
          </div>
        </div>`;
      }).join("");
      return `<div class="round-card"><div class="round-head">Giro ${r} di 3</div>${itemsHtml}</div>`;
    }).join("");

    root.innerHTML = `
      <div class="wrap">
        <div class="hdr">
          <div class="eyebrow">Scheda di allenamento</div>
          <h1>${day.label} — ${day.sub}</h1>
          <div class="date">${dateLabel}</div>
          <div class="sync-status ${syncStatus.cls}">${syncStatus.text}</div>
        </div>

        <div class="tabs">${tabsHtml}</div>

        <div class="progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-pct">${pct}%</div>
        </div>

        <div class="section-title"><div class="eyebrow">Esercizi principali</div></div>
        ${exHtml}

        <div class="section-title">
          <div class="eyebrow">Circuito finale</div>
          <h2>Addome</h2>
          <p>3 giri, riposo 60" tra un giro e l'altro</p>
        </div>
        ${roundsHtml}

        <div class="sync-bar">
          <button class="primary" id="syncBtn">Sincronizza allenamento di oggi</button>
        </div>
        <div class="footer-note" id="syncStatusMsg">I dati restano salvati sul telefono. "Sincronizza" li invia anche al foglio Log su Google Sheets.</div>
      </div>

      <button class="fab" id="fabBtn">⏱</button>
      <div class="overlay" id="overlay"></div>
      <div class="timer-panel" id="timerPanel">
        <div class="th"><span>Cronometro / Riposo</span><button class="close-btn" id="closeTimer">✕</button></div>
        <div class="timer-display mono" id="timerDisplay">${fmtTime(timer.mode ? timer.seconds : timer.preset)}</div>
        <div class="presets" id="presetsRow">
          <button data-preset="60" class="${timer.preset===60?'sel':''}">60"</button>
          <button data-preset="90" class="${timer.preset===90?'sel':''}">90"</button>
          <button data-preset="120" class="${timer.preset===120?'sel':''}">120"</button>
        </div>
        <div class="timer-controls" style="margin-top:14px;">
          <button id="startPauseBtn" class="primary">${timer.running ? 'Pausa' : 'Avvia'}</button>
          <button id="resetTimerBtn">Reset</button>
          <button id="stopwatchBtn">Cronometro libero</button>
        </div>
      </div>
    `;

    attachEvents();
  }

  function attachEvents(){
    const root = document.getElementById("app-root");

    root.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
      state.currentDay = t.dataset.day;
      safeSet("lastDay", state.currentDay);
      render();
    }));

    root.querySelectorAll(".set-btn").forEach(b => b.addEventListener("click", () => {
      const exId = b.dataset.ex, idx = parseInt(b.dataset.idx,10);
      const arr = state.progress[state.currentDay].exercises[exId];
      arr[idx] = !arr[idx];
      saveProgress(state.currentDay);
      render();
    }));

    root.querySelectorAll("[data-weight-ex]").forEach(inp => inp.addEventListener("change", () => {
      const exId = inp.dataset.weightEx;
      state.weights[state.currentDay][exId] = inp.value;
      saveWeights(state.currentDay);
    }));

    root.querySelectorAll("[data-rest]").forEach(b => b.addEventListener("click", () => {
      openTimerPanel();
      setPreset(parseInt(b.dataset.rest,10));
      timer.mode = "rest"; timer.seconds = timer.preset;
      startCountdownRaw();
    }));

    root.querySelectorAll("[data-circuit]").forEach(b => b.addEventListener("click", () => {
      const r = b.dataset.circuit, item = b.dataset.item;
      const c = state.progress[state.currentDay].circuit[r];
      c[item] = !c[item];
      saveProgress(state.currentDay);
      render();
    }));

    root.querySelectorAll("[data-timer-item]").forEach(b => b.addEventListener("click", () => {
      const [r, itemId, duration] = b.dataset.timerItem.split("|");
      const tag = state.currentDay + "-" + r + "-" + itemId;
      if (timer.mode === "circuittimer" && timer.onFinishTag === tag && timer.running) return;
      openTimerPanel();
      timer.mode = "circuittimer";
      timer.onFinishTag = tag;
      timer.seconds = parseInt(duration,10) || 40;
      startCountdownRaw();
    }));

    document.getElementById("syncBtn").addEventListener("click", () => syncDayToSheet(state.currentDay));

    document.getElementById("fabBtn").addEventListener("click", () => {
      if (!timer.mode) { timer.mode = "rest"; timer.seconds = timer.preset; }
      openTimerPanel();
    });
    document.getElementById("closeTimer").addEventListener("click", closeTimerPanel);
    document.getElementById("overlay").addEventListener("click", closeTimerPanel);

    document.getElementById("startPauseBtn").addEventListener("click", () => {
      if (timer.running) { pauseTimer(); } else {
        if (!timer.mode) { timer.mode = "rest"; timer.seconds = timer.preset; }
        startCountdownRaw();
      }
    });
    document.getElementById("resetTimerBtn").addEventListener("click", () => {
      pauseTimer();
      timer.mode = "rest"; timer.seconds = timer.preset; timer.onFinishTag = null;
      updateTimerDisplay();
    });
    document.getElementById("stopwatchBtn").addEventListener("click", () => {
      pauseTimer();
      timer.mode = "stopwatch"; timer.seconds = 0; timer.onFinishTag = null;
      startCountdownRaw();
    });

    document.querySelectorAll("#presetsRow button").forEach(b => b.addEventListener("click", () => {
      setPreset(parseInt(b.dataset.preset,10));
      timer.mode = "rest"; timer.seconds = timer.preset;
      updateTimerDisplay();
      document.querySelectorAll("#presetsRow button").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
    }));
  }

  function setPreset(v){ timer.preset = v; }

  function openTimerPanel(){
    document.getElementById("timerPanel").classList.add("open");
    document.getElementById("overlay").classList.add("show");
    updateTimerDisplay();
  }
  function closeTimerPanel(){
    document.getElementById("timerPanel").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  }

  function startCountdownRaw(){
    if (timer.interval) clearInterval(timer.interval);
    timer.running = true;
    updateStartPauseLabel();
    timer.interval = setInterval(() => {
      if (timer.mode === "stopwatch") { timer.seconds += 1; }
      else {
        timer.seconds -= 1;
        if (timer.seconds <= 0) { timer.seconds = 0; finishTimer(); }
      }
      updateTimerDisplay();
    }, 1000);
    updateTimerDisplay();
  }

  function pauseTimer(){
    timer.running = false;
    if (timer.interval) clearInterval(timer.interval);
    timer.interval = null;
    updateStartPauseLabel();
  }

  function finishTimer(){
    pauseTimer();
    if (timer.mode === "circuittimer" && timer.onFinishTag){
      const parts = timer.onFinishTag.split("-");
      const itemId = parts.pop();
      const r = parts.pop();
      const dayId = parts.join("-");
      if (state.progress[dayId]) {
        state.progress[dayId].circuit[r][itemId] = true;
        saveProgress(dayId);
      }
    }
    if (navigator.vibrate) { try { navigator.vibrate([200,100,200]); } catch(e){} }
    render();
    openTimerPanel();
  }

  function updateStartPauseLabel(){
    const btn = document.getElementById("startPauseBtn");
    if (btn) btn.textContent = timer.running ? "Pausa" : "Avvia";
  }

  function updateTimerDisplay(){
    const disp = document.getElementById("timerDisplay");
    if (disp) disp.textContent = fmtTime(timer.seconds);
    document.querySelectorAll("[data-timer-item]").forEach(b => {
      const [r, itemId, duration] = b.dataset.timerItem.split("|");
      const tag = state.currentDay + "-" + r + "-" + itemId;
      const rState = state.progress[state.currentDay].circuit[r];
      if (rState[itemId]) { b.textContent = "✓ Fatto"; b.classList.remove("running"); b.classList.add("done"); return; }
      if (timer.mode === "circuittimer" && timer.onFinishTag === tag && timer.running) {
        b.textContent = fmtTime(timer.seconds); b.classList.add("running");
      } else {
        b.textContent = 'Avvia ' + duration + '"'; b.classList.remove("running");
      }
    });
  }

  // ---------------------------- BOOT ----------------------------
  async function boot(){
    const sheetData = await fetchSheetData();
    let giorni = DEFAULT_GIORNI, esercizi = DEFAULT_ESERCIZI, circuito = DEFAULT_CIRCUITO;
    if (sheetData && sheetData.giorni && sheetData.giorni.length) giorni = sheetData.giorni;
    if (sheetData && sheetData.esercizi && sheetData.esercizi.length) esercizi = sheetData.esercizi;
    if (sheetData && sheetData.circuito && sheetData.circuito.length) circuito = sheetData.circuito;

    const built = buildDaysFromSheets(giorni, esercizi, circuito);
    DAYS = built.days;
    CIRCUIT = built.circuit;

    loadProgressAndWeights();
    render();
  }

  boot();
})();
</script>
</body>
</html>
